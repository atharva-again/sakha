name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run sakha lint

      - name: Typecheck
        run: uv run sakha typecheck

      - name: Test
        run: uv run sakha test
